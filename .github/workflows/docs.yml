name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/**/src/**"
      - "scripts/gen-doc-sources.ts"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "packages/**/src/**"
      - "scripts/gen-doc-sources.ts"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify SOURCES.md is up to date
        run: pnpm --filter @usejourney/docs run sources:check
      - name: Build docs site
        run: pnpm --filter @usejourney/docs run docs:build
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
